services:
  db:
    image: postgres:16-alpine
    container_name: gestpracticas-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gestpracticas}
      POSTGRES_USER: ${POSTGRES_USER:-gestpracticas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-super-long-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  pgbouncer:
    image: edoburu/pgbouncer:v1.23.1-p1
    container_name: gestpracticas-pgbouncer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-gestpracticas}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-this-super-long-password}
      DB_NAME: ${POSTGRES_DB:-gestpracticas}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN:-200}
      DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-20}
      RESERVE_POOL_SIZE: ${PGBOUNCER_RESERVE_POOL_SIZE:-5}
      SERVER_RESET_QUERY: DISCARD ALL
      IGNORE_STARTUP_PARAMETERS: extra_float_digits
      ADMIN_USERS: ${POSTGRES_USER:-gestpracticas}
      AUTH_TYPE: scram-sha-256
      LISTEN_PORT: 6432
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 6432"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - backend

  app:
    build:
      context: .
      target: runner
    container_name: gestpracticas-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-gestpracticas}:${POSTGRES_PASSWORD:-change-this-super-long-password}@pgbouncer:6432/${POSTGRES_DB:-gestpracticas}?schema=public&pgbouncer=true&connection_limit=${PRISMA_CONNECTION_LIMIT:-10}&pool_timeout=${PRISMA_POOL_TIMEOUT:-20}
      DIRECT_URL: postgresql://${POSTGRES_USER:-gestpracticas}:${POSTGRES_PASSWORD:-change-this-super-long-password}@db:5432/${POSTGRES_DB:-gestpracticas}?schema=public
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge
